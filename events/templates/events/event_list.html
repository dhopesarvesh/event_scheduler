


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Events</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    
    <div class="d-flex justify-content-end align-items-center mb-3">
        <span class="me-3">
            Logged in as: <strong>{{ user.username }}</strong>
        </span>
        <form action="{% url 'logout' %}" method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>

   
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>My Scheduled Events</h2>
        <a href="{% url 'event_create' %}" class="btn btn-primary">Add New Event</a>
    </div>


    <ul class="list-group">
        {% for event in events %}
        <li class="list-group-item">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <strong class="text-primary">{{ event.name }}</strong>
                    <div class="text-muted small">
                        {{ event.date }} at {{ event.time }}
                    </div>
                    <span class="badge bg-secondary mt-1">
                        {{ event.get_category_display }}
                    </span>
                </div>
                <div>
                    <a href="{% url 'event_edit' event.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'event_delete' event.id %}" class="btn btn-sm btn-danger">Delete</a>
                </div>
            </div>
        </li>
        {% empty %}
        <li class="list-group-item text-center text-muted">
            No events scheduled.
        </li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
